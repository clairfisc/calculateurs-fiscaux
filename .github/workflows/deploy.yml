name: Deploy

# Déploiement du site statique (dist/) vers l'hébergement OVH par FTPS.
# Déclenché à chaque push sur main, après build + tests.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   FTP_SERVER   ex. ftp.clusterXXX.hosting.ovh.net
#   FTP_USER     identifiant FTP OVH
#   FTP_PASSWORD mot de passe FTP OVH

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # OVH free hosting : pas de FTPS, mais SFTP dispo sur le port 22 (transfert
      # chiffré, sans shell). On pousse dist/ dans www/ via sftp en mode batch.
      # Le glob `dist/*` ignore les dotfiles → on ajoute un put explicite pour
      # `.htaccess`. Mot de passe fourni par sshpass -e (env SSHPASS), jamais en
      # ligne de commande. BatchMode=no pour autoriser l'auth par mot de passe.
      - name: Deploy to OVH (SFTP)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass openssh-client
          cat > sftp-batch <<'SFTP'
          put -r dist/* www/
          put dist/.htaccess www/.htaccess
          bye
          SFTP
          sshpass -e sftp \
            -oBatchMode=no \
            -oStrictHostKeyChecking=no \
            -oUserKnownHostsFile=/dev/null \
            -oConnectTimeout=20 \
            -P 22 -b sftp-batch "$FTP_USER@$FTP_SERVER"
