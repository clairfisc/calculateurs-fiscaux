name: Deploy

# Déploiement du site statique (dist/) vers l'hébergement OVH par SFTP (port 22).
# Déclenché à chaque push sur main, après build + tests.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   FTP_SERVER   hôte SFTP (ex. ssh.clusterXXX.hosting.ovh.net)
#   FTP_USER     identifiant SFTP OVH
#   FTP_PASSWORD mot de passe SFTP OVH

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # OVH free hosting : pas de FTPS, mais SFTP dispo sur le port 22 (transfert
      # chiffré, sans shell). Auth par mot de passe via `sshpass -e sftp` (fiable ;
      # sshpass+lftp ne l'est pas). On génère un batch avec UNE commande put par
      # entrée de dist/ (le `put -r *` multi-arg est ambigu côté sftp), dotfiles
      # (.htaccess) inclus explicitement. Destination = cwd distant (www).
      - name: Deploy to OVH (SFTP)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
          # Épinglage de la clé d'hôte (anti-MITM). Optionnel : si défini, la
          # connexion vérifie l'identité du serveur ; sinon repli non vérifié +
          # warning. Pour le poser : `ssh-keyscan -p 22 <FTP_SERVER>` → coller la
          # sortie dans le secret SFTP_KNOWN_HOSTS. Voir DEPLOY.md §3.
          SFTP_KNOWN_HOSTS: ${{ secrets.SFTP_KNOWN_HOSTS }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass openssh-client
          {
            echo "-mkdir www"
            echo "cd www"
            echo "lcd dist"
            for path in dist/* dist/.htaccess; do
              [ -e "$path" ] || continue
              name=$(basename "$path")
              if [ -d "$path" ]; then
                echo "put -r $name"
              else
                # rm d'abord : le SFTP OVH échoue à écraser un fichier existant
                # (index.html par défaut, ou redéploiement). Le '-' ignore l'absence.
                echo "-rm $name"
                echo "put $name"
              fi
            done
            echo "bye"
          } > sftp-batch
          echo "----- batch sftp -----"; cat sftp-batch; echo "----------------------"
          # Vérification de l'identité du serveur : stricte si SFTP_KNOWN_HOSTS
          # est défini (ferme la fenêtre MITM qui pourrait intercepter le mot de
          # passe), sinon repli non vérifié + warning (migration non bloquante).
          if [ -n "$SFTP_KNOWN_HOSTS" ]; then
            printf '%s\n' "$SFTP_KNOWN_HOSTS" > known_hosts
            HOST_OPTS="-oStrictHostKeyChecking=yes -oUserKnownHostsFile=known_hosts"
          else
            echo "::warning::SFTP_KNOWN_HOSTS non défini — identité du serveur non vérifiée (MITM possible). Voir DEPLOY.md §3."
            HOST_OPTS="-oStrictHostKeyChecking=no -oUserKnownHostsFile=/dev/null"
          fi
          sshpass -e sftp \
            -oBatchMode=no \
            $HOST_OPTS \
            -oConnectTimeout=20 \
            -P 22 -b sftp-batch "$FTP_USER@$FTP_SERVER"
